<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        


        <title>Agenda</title>
  <script src="pouchdb.min.js"></script>
  
   
  
</head>

<body>

 
  <br />
  <div class="container my-custom-class">Conteúdo</div>
   
   
  <label for="nombreCompleto">Nome: </label>
    
    <input placeholder="Nome ou apellidos" type="text" name="nombreCompleto" id="nombreCompleto" />
   <label for="telefono"> Teléfone:</label>
  <input placeholder="Telefone, 11-9955 22 33" type="tel" name="telefono" id="telefono" />
   
  <label for="direccion">Endreco:</label>
  
  <textarea placeholder="Escriva o endreco..." name="direccion" id=direccion rows="4" cols="30"></textarea>
  
 
  <br>
  <button id="btnGuardar">Guardar</button>
  <button id="btnGuardarCambios">Guardar </button>
  <button id="btnCancelarEdicion">Cancelar</button>
   
  <br />
              
  <br />
  
  
  <table id="example" class="table table-striped table-bordered table-responsive table-hover" style="font-size: 13px;" >
  
  
                <thead class="table-info">
                    <tr>
    
        <th>Nombre</th>
        <th>Dirección</th>
        <th>Teléfono</th>
        <th><button>Editar</button></th>
        <th>Eliminar</th>
      </tr>
    </thead>
    <tbody id="cuerpoTabla">

    </tbody>
  </table>
  <script src="script.js"></script>
   
   <script>
        $(document).ready(function () {
            $('#example').DataTable({
                "processing": true,
                "lengthMenu": [
                    [25, 25, -1],
                    [25, 25, "Todos"]
                ],
                "columnDefs": [{
                    "searchable": true,
                    "orderable": true,
                    "targets": 0,
                }],
    
    
                "order": [
                    [0, 'asc']
                ],
                "language": {
                    "lengthMenu": "Exibir _MENU_ resultados por página",
                    "zeroRecords": "Não funcionou - tente novamente.",
                },
                "oLanguage": {
    
                    "lengthMenu": "Exibir _MENU_ resultados por página",
                    "sInfo": "Exibindo página _START_ de _END_ de um total de _TOTAL_ registros",
                    "sInfoEmpty": "Tabela vazia",
                    "sSearch": "Pesquisar",
                    "sInfoFiltered": "",
                    "oPaginate": {
                        "sLast": "Último",
                        "sFirst": "Primeiro",
                        "sPrevious": "Anterior",
                        "sNext": "Próximo",
    
                    }
                },
                dom: 'Brtip',
                // dom: 'Bfrtip',
                buttons: [
                    {
                        extend: 'copy',
                        text: 'Copiar',
                        "className": 'btn border-left-success shadow btn-light',
                    },
                    {
                        extend: 'excel',
                        text: 'Excel',
                        "className": 'btn  shadow  btn-light',
                    },
                    {
                        extend: 'pdf',
                        text: 'PDF',
                        "className": 'btn  shadow  btn-light',
                    },
                    {
                        extend: 'print',
                        text: 'Imprimir',
                        "className": 'btn border-right-success shadow  btn-light',
                    }
    
                ]
    
    
            });
    
            $('#example thead th').each(function () {
                var title = $('#example thead th').eq($(this).index()).text();
                $(this).html('<input class="form-control" type="text" placeholder="' + title + '" />');
            });
    
            // DataTable
            var table = $('#example').DataTable();
    
            // Apply the search
            table.columns().eq(0).each(function (colIdx) {
                $('input', table.column(colIdx).header()).on('keyup change', function () {
                    table
                        .column(colIdx)
                        .search(this.value)
                        .draw();
                });
    
            });
    
        });
    </script>
  
</body>

</html>
